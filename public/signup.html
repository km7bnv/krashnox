<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div style="max-width:400px; margin:100px auto; padding:20px; background-color:#1e293b; border-radius:10px; text-align:center;">

  <h2>Create Account</h2>

  <input id="username" placeholder="Username" style="width:100%; margin-bottom:15px;">

<script src="client.js"></script>

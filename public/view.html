<!DOCTYPE html>
<html>
<head>
  <title>View Message</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <div class="sidebar">
    <button onclick="location.href='compose.html'">Compose</button>
    <button onclick="location.href='inbox.html'">Inbox</button>
    <button onclick="location.href='sent.html'">Sent</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <h2 id="viewSubject"></h2>

    <div id="conversation"></div>

    <div style="margin-top:20px;">
      <button onclick="reply()" id="replyBtn">Reply</button>
      <button onclick="deleteThread()" id="deleteThreadBtn">Delete Thread</button>
    </div>

  </div>

</div>

<script src="client.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const threadId = sessionStorage.getItem("threadId")
    if (!threadId) return

    // Load subject
    const messages = await api("/api/thread?id=" + threadId)
    if (messages.length > 0) {
      document.getElementById("viewSubject").textContent = messages[0].subject || "No Subject"
    }
  })

  async function api(url, method = "GET", data = null) {
    const options = { method, headers: {} }
    if (data) {
      options.headers["Content-Type"] = "application/json"
      options.body = JSON.stringify(data)
    }
    return (await fetch(url, options)).json()
  }
</script>

</body>
</html>
